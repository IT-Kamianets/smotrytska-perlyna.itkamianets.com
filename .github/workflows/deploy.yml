name: Deploy Next.js to gh-pages

on:
  push:
    branches: [master]

permissions:
  contents: write 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      # ФІКС 1: Жорстко створюємо .nojekyll, щоб GitHub не ігнорував папку _next
      - name: Create .nojekyll file
        run: touch ./out/.nojekyll

      # ФІКС 2: Явно створюємо CNAME прямо в папці зі збіркою
      - name: Create CNAME file
        run: echo "smotrytska-perlyna.itkamianets.com" > ./out/CNAME

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out